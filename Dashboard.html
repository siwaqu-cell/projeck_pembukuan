<!-- Dashboard.html — KPI, Charts, Recent Data -->
<script>
async function loadDashboard() {
  const cab = Session.getCabang();
  const content = document.getElementById('pageContent');

  content.innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title">📊 Dashboard</h1>
        <p class="page-subtitle">Ringkasan operasional <span id="dashSubtitleCabang">Semua Cabang</span></p>
      </div>
      <div class="filter-bar" style="margin-bottom:0;background:transparent;border:none;padding:0">
        <button class="btn btn-outline" style="margin-right:8px" onclick="refreshDashboard()">🔄 Refresh</button>
        ${!Session.isCabangLocked() ? `
        <div class="form-group">
          <label class="form-label">Cabang</label>
          <select class="form-control" id="dashCabang" onchange="refreshDashboard()">
            <option value="SEMUA">Semua Cabang</option>
          </select>
        </div>` : ''}
        <div class="form-group">
          <label class="form-label">Dari</label>
          <input type="date" class="form-control" id="dashStart" value="${getMonthStartStr()}" onchange="refreshDashboard()">
        </div>
        <div class="form-group">
          <label class="form-label">Sampai</label>
          <input type="date" class="form-control" id="dashEnd" value="${getTodayStr()}" onchange="refreshDashboard()">
        </div>
      </div>
    </div>

    <div class="kpi-grid" id="kpiGrid">
      <div class="kpi-card"><div class="kpi-label">Total Servis</div><div class="kpi-value" id="kpiServis">-</div></div>
      ${Session.getRole() === 'OWNER' ? `
      <div class="kpi-card"><div class="kpi-label">Pendapatan</div><div class="kpi-value" id="kpiPendapatan">-</div></div>
      <div class="kpi-card"><div class="kpi-label">Laba Bersih</div><div class="kpi-value" id="kpiLaba">-</div></div>
      ` : ''}
      <div class="kpi-card"><div class="kpi-label">Piutang</div><div class="kpi-value" id="kpiPiutang">-</div></div>
      <div class="kpi-card"><div class="kpi-label">Kas Masuk</div><div class="kpi-value" id="kpiKasMasuk">-</div></div>
      <div class="kpi-card"><div class="kpi-label">Kas Keluar</div><div class="kpi-value" id="kpiKasKeluar">-</div></div>
      <div class="kpi-card"><div class="kpi-label">Saldo</div><div class="kpi-value" id="kpiSaldo">-</div></div>
      <div class="kpi-card"><div class="kpi-label">Hutang Supplier</div><div class="kpi-value" id="kpiHutang">-</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      <div class="card">
        <div class="card-header"><h3 class="card-title">📊 Status Servisan</h3></div>
        <div id="statusChart" style="min-height:200px"></div>
      </div>
      ${Session.getRole() === 'OWNER' ? `
      <div class="card">
        <div class="card-header"><h3 class="card-title">💳 Pendapatan per Metode</h3></div>
        <div id="metodeChart" style="min-height:200px"></div>
      </div>
      ` : '<div></div>'}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      <div class="card">
        <div class="card-header"><h3 class="card-title">📋 10 Transaksi Terbaru</h3></div>
        <div class="table-container" id="recentTrxTable"></div>
      </div>
      <div class="card">
        <div class="card-header"><h3 class="card-title">💰 10 Kas Terbaru</h3></div>
        <div class="table-container" id="recentKasTable"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3 class="card-title">📦 Stok Rendah</h3></div>
      <div class="table-container" id="lowStokTable"></div>
    </div>
  `;

  // Populate cabang dropdown
  if (!Session.isCabangLocked()) {
    try {
      const cabList = await API.call('getCabangList');
      const sel = document.getElementById('dashCabang');
      if (sel) {
        cabList.forEach(c => {
          const o = document.createElement('option'); o.value=c.id; o.textContent=c.id+' - '+c.nama; sel.appendChild(o);
        });
        sel.value = Session.getActiveViewCabang();
      }
    } catch(e) {}
  }

  refreshDashboard();
}

async function refreshDashboard() {
  const cabSel = document.getElementById('dashCabang');
  if (cabSel && !Session.isCabangLocked()) {
    Session.setActiveViewCabang(cabSel.value);
  }
  const cab = Session.getActiveViewCabang();
  
  const sub = document.getElementById('dashSubtitleCabang');
  if (sub) sub.textContent = cab === 'SEMUA' ? 'Semua Cabang' : cab;

  // Trigger Branding Update
  if (typeof updateBranchStyle === 'function') updateBranchStyle(cab);
  
  const startDate = document.getElementById('dashStart')?.value || getMonthStartStr();
  const endDate = document.getElementById('dashEnd')?.value || getTodayStr();

  try {
    console.log('[DASH DEBUG] cab:', cab, 'startDate:', startDate, 'endDate:', endDate);
    const data = await API.call('getDashboardData', cab, {startDate, endDate});
    console.log('[DASH DEBUG] data received:', JSON.stringify(data?.kpi), 'recentKas count:', data?.recentKas?.length, 'recentTrx count:', data?.recentTrx?.length);
    if (!data || !data.kpi) return;

    // KPI
    const k = data.kpi;
    animateNumber('kpiServis', k.totalServis||0, false);
    if (Session.getRole() === 'OWNER') {
      animateNumber('kpiPendapatan', k.totalPendapatan||0, true);
      animateNumber('kpiLaba', k.totalLaba||0, true);
    }
    animateNumber('kpiPiutang', k.totalPiutang||0, true);
    animateNumber('kpiKasMasuk', k.kasMasuk||0, true);
    animateNumber('kpiKasKeluar', k.kasKeluar||0, true);
    animateNumber('kpiSaldo', k.saldo||0, true);
    animateNumber('kpiHutang', k.totalHutang||0, true);

    // Status chart (bar chart using CSS)
    renderStatusChart(data.statusCount || {});
    renderMetodeChart(data.metodeCount || {});
    renderRecentTrx(data.recentTrx || []);
    renderRecentKas(data.recentKas || []);
    renderLowStok(data.stok?.lowStok || []);

  } catch(e) {
    Toast.error('Gagal memuat dashboard: '+e.message);
  }
}

function animateNumber(elId, target, isCurrency) {
  const el = document.getElementById(elId);
  if (!el) return;
  let current = 0;
  const step = Math.max(1, Math.floor(target / 30));
  const timer = setInterval(() => {
    current += step;
    if (current >= target) { current = target; clearInterval(timer); }
    el.textContent = isCurrency ? formatRupiah(current) : formatNumber(current);
  }, 30);
}

function renderStatusChart(statusCount) {
  const el = document.getElementById('statusChart');
  if (!el) return;
  const total = Object.values(statusCount).reduce((a,b)=>a+b, 0) || 1;
  const colors = {ANTRI:'#f59e0b', PROSES:'#6366f1', SEDANG_PROSES:'#818cf8', SELESAI_BELUM_DIAMBIL:'#06b6d4', SELESAI_BELUM_LUNAS:'#ec4899', SELESAI_DIAMBIL:'#10b981', BATAL:'#ef4444'};
  const labels = {ANTRI:'Antri', PROSES:'Proses', SEDANG_PROSES:'Sdg Proses', SELESAI_BELUM_DIAMBIL:'Selesai', SELESAI_BELUM_LUNAS:'Blm Lunas', SELESAI_DIAMBIL:'Diambil', BATAL:'Batal'};
  let html = '';
  Object.entries(statusCount).forEach(([s,v]) => {
    const pct = Math.round(v/total*100);
    html += `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px">
        <span>${labels[s]||s}</span><span>${v} (${pct}%)</span>
      </div>
      <div style="height:8px;background:var(--bg-glass);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${colors[s]||'#6366f1'};border-radius:4px;transition:width 0.8s ease"></div>
      </div>
    </div>`;
  });
  el.innerHTML = html || '<div class="empty-state"><p>Belum ada data</p></div>';
}

function renderMetodeChart(metodeCount) {
  const el = document.getElementById('metodeChart');
  if (!el) return;
  const colors = {CASH:'#10b981', TRANSFER:'#6366f1', BON:'#f59e0b', 'N/A':'#64748b'};
  let html = '<div style="display:flex;flex-direction:column;gap:12px">';
  Object.entries(metodeCount).forEach(([m,v]) => {
    html += `<div style="display:flex;align-items:center;gap:12px">
      <div style="width:10px;height:10px;border-radius:50%;background:${colors[m]||'#6366f1'}"></div>
      <span style="font-size:13px;color:var(--text-secondary);min-width:80px">${m}</span>
      <span style="font-size:14px;font-weight:600">${formatRupiah(v)}</span>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html || '<div class="empty-state"><p>Belum ada data</p></div>';
}

function renderRecentTrx(trx) {
  const el = document.getElementById('recentTrxTable');
  if (!el) return;
  if (!trx.length) { el.innerHTML='<div class="empty-state"><p>Belum ada transaksi</p></div>'; return; }
  let html = '<table class="data-table"><thead><tr><th>ID</th><th>Pelanggan</th><th>HP</th><th>Status</th><th class="text-right">Total</th></tr></thead><tbody>';
  trx.forEach(t => {
    html += `<tr style="cursor:pointer" onclick="goToStatus('${t.ID_TRANSAKSI||''}')" title="Klik untuk Update Status / Edit Part">
      <td style="font-size:11px; color:var(--primary)">${t.ID_TRANSAKSI||''}</td>
      <td>${t.NAMA_PELANGGAN||''}</td>
      <td>${t.TIPE_HP||''}</td>
      <td>${getStatusBadge(t.STATUS)}</td>
      <td class="text-right">${formatRupiah((Number(t.HARGA_JUAL)||0)+(Number(t.ONGKOS_KERJA)||0))}</td>
    </tr>`;
  });
  el.innerHTML = html + '</tbody></table>';
}

function renderRecentKas(kas) {
  const el = document.getElementById('recentKasTable');
  if (!el) return;
  if (!kas.length) { el.innerHTML='<div class="empty-state"><p>Belum ada data kas</p></div>'; return; }
  let html = '<table class="data-table"><thead><tr><th>Tanggal</th><th>Jenis</th><th>Keterangan</th><th class="text-right">Jumlah</th></tr></thead><tbody>';
  kas.forEach(k => {
    const color = k.JENIS==='MASUK'?'var(--accent-emerald)':'var(--accent-red)';
    html += `<tr><td style="font-size:11px">${formatDateShort(k.TANGGAL)}</td><td><span style="color:${color};font-weight:600">${k.JENIS}</span></td><td style="font-size:12px">${k.KETERANGAN||''}</td><td class="text-right" style="color:${color};font-weight:600">${formatRupiah(k.JUMLAH)}</td></tr>`;
  });
  el.innerHTML = html + '</tbody></table>';
}

function renderLowStok(items) {
  const el = document.getElementById('lowStokTable');
  if (!el) return;
  if (!items.length) { el.innerHTML='<div class="empty-state" style="padding:20px"><p>✅ Semua stok aman</p></div>'; return; }
  let html = '<table class="data-table"><thead><tr><th>Part</th><th>Merk</th><th>Cabang</th><th class="text-center">Stok</th></tr></thead><tbody>';
  items.forEach(i => {
    const c = i.stok<=0?'var(--accent-red)':'var(--accent-amber)';
    html += `<tr><td>${i.nama}</td><td>${i.merk||'-'}</td><td>${i.cabang}</td><td class="text-center" style="color:${c};font-weight:700">${i.stok}</td></tr>`;
  });
  el.innerHTML = html + '</tbody></table>';
}
</script>
