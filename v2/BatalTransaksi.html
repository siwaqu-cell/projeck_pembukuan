<!-- BatalTransaksi.html — Modul Pembatalan Transaksi -->
<style>
  .batal-panel {
    max-width: 800px;
    margin: 0 auto;
  }
  .batal-result {
    margin-top: 24px;
    padding: 20px;
    border: 1px solid var(--accent-red);
    border-radius: var(--radius-md);
    background: rgba(239, 68, 68, 0.05);
    display: none;
  }
  .batal-item-list {
    margin: 15px 0;
    padding: 15px;
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
  }
  .batal-list-item {
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
  }
  .batal-list-item:hover {
    background: var(--bg-tertiary);
    border-color: var(--primary);
  }
  .batal-list-item.is-batal {
    opacity: 0.5;
    cursor: not-allowed;
    background: rgba(239,68,68,0.05);
  }
</style>

<script>
let currentBatalData = null;
let batalAllTrx = [];

async function loadBatalTransaksi() {
  const content = document.getElementById('pageContent');
  
  var role = Session.getRole();
  if (role !== 'OWNER' && role !== 'ADMIN') {
    content.innerHTML = `
      <div class="card" style="text-align:center; padding: 50px;">
        <div style="font-size: 48px; margin-bottom:20px;">🔒</div>
        <h2>Akses Ditolak</h2>
        <p class="text-muted">Hanya OWNER dan ADMIN yang diizinkan untuk membatalkan transaksi.</p>
      </div>`;
    return;
  }
  
  content.innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title">⚠️ Pembatalan Transaksi</h1>
        <p class="page-subtitle">Pembalikan stok dan kas untuk transaksi yang salah input</p>
      </div>
    </div>

    <div class="card batal-panel">
      <div class="form-group">
        <label class="form-label">Cari Transaksi</label>
        <div style="display:flex; gap:10px;">
          <input type="text" id="batalSearchId" class="form-control" placeholder="🔍 Ketik ID, Nama, No HP, atau Tipe HP..." autocomplete="off" oninput="filterBatalList()">
        </div>
      </div>
      <div id="batalListContainer" style="max-height:400px;overflow-y:auto;margin-top:12px">
        <div class="text-center text-muted" style="padding:30px">Memuat data transaksi...</div>
      </div>

      <div id="batalResultPanel" class="batal-result">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
          <h3 style="color:var(--accent-red);margin:0">Data Transaksi Ditemukan</h3>
          <button class="btn btn-outline" onclick="closeBatalDetail()" style="font-size:12px">✕ Tutup</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:14px; margin-bottom:15px;">
          <div><strong>ID:</strong> <span id="btlId"></span></div>
          <div><strong>Tanggal:</strong> <span id="btlTgl"></span></div>
          <div><strong>Pelanggan:</strong> <span id="btlPelanggan"></span></div>
          <div><strong>No HP:</strong> <span id="btlTelp"></span></div>
          <div><strong>Cabang:</strong> <span id="btlCabang"></span></div>
          <div><strong>Status:</strong> <span id="btlStatus" style="font-weight:bold; color:var(--accent-warning)"></span></div>
          <div><strong>Tipe HP:</strong> <span id="btlHP"></span></div>
          <div><strong>Total:</strong> <span id="btlTotal" style="font-weight:bold;"></span></div>
        </div>
        
        <strong>Rincian Part / Barang:</strong>
        <div class="batal-item-list" id="btlItems"></div>
        
        <div class="alert" style="background:rgba(239, 68, 68, 0.1); border-left:4px solid var(--accent-red); padding:10px; margin-bottom:20px; font-size:13px;">
          <strong>PERINGATAN:</strong> Membatalkan transaksi ini akan mengembalikan stok barang ke gudang dan mencatat pengeluaran kas pembalik. Tindakan ini tidak bisa di-undo!
        </div>
        
        <button class="btn btn-danger" style="width:100%" onclick="executePembatalan()">🚨 VOID / BATALKAN TRANSAKSI INI</button>
      </div>
    </div>
  `;
  
  // Load all transactions
  Loading.show('Memuat transaksi...');
  try {
    const cab = Session.getCabang();
    const [trxData, pnjData] = await Promise.all([
      API.call('getTransaksiUntukBatalList', cab === 'SEMUA' ? '' : cab),
      API.call('getPenjualanUntukBatalList', cab === 'SEMUA' ? '' : cab)
    ]);
    batalAllTrx = [];
    if (trxData && trxData.length) batalAllTrx = batalAllTrx.concat(trxData);
    if (pnjData && pnjData.length) batalAllTrx = batalAllTrx.concat(pnjData);
    // Sort by date descending
    batalAllTrx.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
    renderBatalList(batalAllTrx);
  } catch(e) {
    document.getElementById('batalListContainer').innerHTML = '<div class="text-center text-muted" style="padding:30px">Gagal memuat data: ' + e.message + '</div>';
  }
  Loading.hide();
}

function renderBatalList(list) {
  const container = document.getElementById('batalListContainer');
  if (!list || list.length === 0) {
    container.innerHTML = '<div class="text-center text-muted" style="padding:30px">Tidak ada transaksi ditemukan</div>';
    return;
  }
  // Show max 50 results
  const items = list.slice(0, 50);
  container.innerHTML = items.map(t => {
    const isBatal = t.status === 'BATAL' || t.status === 'DIBATALKAN';
    const statusBadge = isBatal 
      ? '<span style="font-size:11px;background:rgba(239,68,68,0.15);color:var(--accent-red);padding:2px 8px;border-radius:4px">BATAL</span>'
      : '<span style="font-size:11px;background:rgba(0,200,83,0.15);color:var(--accent-emerald);padding:2px 8px;border-radius:4px">' + (t.status || '-') + '</span>';
    return `<div class="batal-list-item${isBatal ? ' is-batal' : ''}" ${!isBatal ? `onclick="selectBatalTrx('${t.id}')"` : ''}>
      <div>
        <div style="font-weight:600;font-size:13px">${t.id} ${statusBadge}</div>
        <div style="font-size:12px;color:var(--text-secondary)">${t.pelanggan || '-'} | ${t.tipeHP || t.keterangan || '-'} | ${t.telepon || '-'}</div>
      </div>
      <div style="text-align:right;font-size:13px;font-weight:600">${formatRupiah(t.total)}</div>
    </div>`;
  }).join('');
  if (list.length > 50) {
    container.innerHTML += '<div class="text-center text-muted" style="padding:8px;font-size:12px">Menampilkan 50 dari ' + list.length + ' transaksi. Ketik lebih spesifik untuk filter.</div>';
  }
}

function filterBatalList() {
  const q = (document.getElementById('batalSearchId').value || '').trim().toUpperCase();
  if (!q) {
    renderBatalList(batalAllTrx);
    return;
  }
  const filtered = batalAllTrx.filter(t =>
    (t.id || '').toUpperCase().indexOf(q) !== -1 ||
    (t.pelanggan || '').toUpperCase().indexOf(q) !== -1 ||
    (t.telepon || '').toUpperCase().indexOf(q) !== -1 ||
    (t.tipeHP || '').toUpperCase().indexOf(q) !== -1 ||
    (t.keterangan || '').toUpperCase().indexOf(q) !== -1
  );
  renderBatalList(filtered);
}

function closeBatalDetail() {
  document.getElementById('batalResultPanel').style.display = 'none';
  currentBatalData = null;
}

function selectBatalTrx(id) {
  // Find in local list first
  const local = batalAllTrx.find(t => t.id === id);
  if (local) {
    currentBatalData = local;
    showBatalDetail(local);
    return;
  }
  // Fallback to API search
  searchTransaksiBatalById(id);
}

function showBatalDetail(t) {
  document.getElementById('btlId').textContent = t.id;
  document.getElementById('btlTgl').textContent = t.tanggal;
  document.getElementById('btlPelanggan').textContent = t.pelanggan || '-';
  document.getElementById('btlTelp').textContent = t.telepon || '-';
  document.getElementById('btlCabang').textContent = t.cabang || '-';
  document.getElementById('btlStatus').textContent = t.status;
  document.getElementById('btlHP').textContent = t.tipeHP || t.keterangan || '-';
  document.getElementById('btlTotal').textContent = formatRupiah(t.total);
  
  let itemsHtml = '';
  if (t.parts && t.parts.length) {
    itemsHtml = t.parts.map(p => `<div>- ${p.nama} (${p.qty}x) ${p.supplier ? '| ' + p.supplier : ''}</div>`).join('');
  } else {
    itemsHtml = '<div class="text-muted">Tidak ada part</div>';
  }
  document.getElementById('btlItems').innerHTML = itemsHtml;
  document.getElementById('batalResultPanel').style.display = 'block';
  document.getElementById('batalResultPanel').scrollIntoView({behavior:'smooth'});
}

async function searchTransaksiBatalById(id) {
  Loading.show('Mencari data...');
  try {
    const res = await API.call('getTransaksiUntukBatal', id);
    if (res.success) {
      currentBatalData = res.data;
      showBatalDetail({
        id: res.data.id, tanggal: res.data.tanggal, pelanggan: res.data.pelanggan,
        telepon: res.data.telepon || '-', cabang: res.data.cabang, status: res.data.status,
        tipeHP: res.data.tipeHP || '-', total: res.data.total, parts: res.data.parts
      });
    } else {
      Toast.error(res.message);
    }
  } catch(e) { Toast.error('Error: ' + e.message); }
  Loading.hide();
}

async function executePembatalan() {
  if (!currentBatalData) return;
  
  const confirm = await Modal.confirm('Void Transaksi?', `Anda yakin ingin MEMBATALKAN transaksi ${currentBatalData.id} secara permanen? Stok akan dikembalikan dan Laporan Kas akan diseimbangkan.`);
  
  if (!confirm) return;
  
  Loading.show('Memproses Pembatalan...');
  try {
    const res = await API.call('voidTransaksi', { id: currentBatalData.id, user: Session.getUsername() });
    if (res.success) {
      Toast.success('Transaksi Berhasil Dibatalkan!');
      document.getElementById('batalResultPanel').style.display = 'none';
      document.getElementById('batalSearchId').value = '';
      currentBatalData = null;
      // Reload list
      loadBatalTransaksi();
    } else {
      Toast.error(res.message);
    }
  } catch(e) {
    Toast.error('Gagal: ' + e.message);
  }
  Loading.hide();
}
</script>
