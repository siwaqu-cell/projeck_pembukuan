<!-- KasirForm.html — Manajemen Kasir / Kas Laci Harian -->
<script>
async function loadKasir() {
  const cab = Session.getCabang();
  const content = document.getElementById('pageContent');
  content.innerHTML = `
    <div class="page-header">
      <div><h1 class="page-title">💵 Manajemen Kasir</h1><p class="page-subtitle">Kelola kas fisik di laci (Buka & Tutup Toko)</p></div>
      <button class="btn btn-outline" onclick="navigateTo('dashboard')">← Dashboard</button>
    </div>
    
    <div class="filter-bar">
      ${!Session.isCabangLocked()?`<div class="form-group"><label class="form-label">Cabang</label>
        <select class="form-control" id="kasirCab" onchange="refreshKasir()"><option value="SEMUA">Semua</option></select></div>`:''}
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:24px">
      <div class="kpi-card"><div class="kpi-label">💵 Cash di Laci</div><div class="kpi-value" id="kpiKasFisik" style="background:var(--gradient-success);-webkit-background-clip:text;font-size:24px">Rp 0</div></div>
      <div class="kpi-card"><div class="kpi-label">💳 Non-Tunai (Transfer)</div><div class="kpi-value" id="kpiNonCash" style="font-size:24px">Rp 0</div></div>
      <div class="kpi-card"><div class="kpi-label">⬆️ Cash Masuk Hari Ini</div><div class="kpi-value" id="kpiKasMasukHariIni" style="background:var(--gradient-success);-webkit-background-clip:text">Rp 0</div></div>
      <div class="kpi-card"><div class="kpi-label">⬇️ Cash Keluar Hari Ini</div><div class="kpi-value" id="kpiKasKeluarHariIni" style="background:var(--gradient-danger);-webkit-background-clip:text">Rp 0</div></div>
      <div class="kpi-card"><div class="kpi-label">💳 Transfer Masuk Hari Ini</div><div class="kpi-value" id="kpiNonCashMasuk" style="font-size:20px">Rp 0</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      <!-- Pengeluaran Form -->
      <div class="card">
        <h3 class="card-title" style="margin-bottom:16px">💸 Input Pengeluaran</h3>
        <div class="form-group"><label class="form-label required">Jumlah Pengeluaran (Rp)</label><input type="number" id="pengeluaranJumlah" class="form-control" min="0" placeholder="10000"></div>
        <div class="form-group"><label class="form-label required">Sumber Dana (Metode)</label><select id="pengeluaranMetode" class="form-control"><option value="CASH">CASH (Laci Kasir)</option><option value="TRANSFER">TRANSFER (Non-Tunai)</option></select></div>
        <div class="form-group"><label class="form-label required">Keterangan / Tujuan</label><input type="text" id="pengeluaranKet" class="form-control" placeholder="Beli minum / bayar kurir"></div>
        <button class="btn btn-outline" style="width:100%;margin-top:8px;border-color:var(--accent-red);color:var(--accent-red)" onclick="submitPengeluaran()">Catat Pengeluaran</button>
      </div>

      <!-- Buka / Tutup Toko -->
      <div class="card">
        <h3 class="card-title" style="margin-bottom:16px">🏪 Buka / Tutup Toko</h3>
        <div class="form-group"><label class="form-label">Aksi Kasir</label>
          <select class="form-control" id="kasirAksi" onchange="toggleKasirAksi()">
            <option value="BUKA">Buka Laci (Modal Awal)</option>
            <option value="TUTUP">Tutup Toko (Setor Tunai ke Owner)</option>
            <option value="TUTUP_NONCASH">Setor Non-Tunai (Transfer) ke Owner</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label required" id="labelJumlahAksi">Jumlah Modal (Rp)</label><input type="number" id="aksiJumlah" class="form-control" min="0" placeholder="200000"></div>
        <div class="form-group" id="sisaLaciGroup" style="display:none"><label class="form-label">Estimasi Sisa Laci Besok</label><input type="text" id="aksiSisaBesok" class="form-control" disabled value="Rp 0"></div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" id="btnAksiKasir" onclick="submitAksiKasir()">Proses Modal Awal</button>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title" style="margin-bottom:16px">📋 Riwayat Kas Hari Ini</h3>
      <div class="table-container" id="kasirHistoryTable"></div>
    </div>
  `;

  if(!Session.isCabangLocked()){try{const cl=await API.call('getCabangList');const sel=document.getElementById('kasirCab');
    cl.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.id;sel.appendChild(o);});
    if(sel) sel.value = Session.getActiveViewCabang();
  }catch(e){}}
  
  // Event listener untuk hitung sisa
  document.getElementById('aksiJumlah').addEventListener('input', hitungSisaLaci);
  
  refreshKasir();
}

let currentKasData = {};

async function refreshKasir() {
  const cabSel = document.getElementById('kasirCab');
  if (cabSel && !Session.isCabangLocked()) {
    Session.setActiveViewCabang(cabSel.value);
  }
  const cab = Session.getActiveViewCabang();
  if (typeof updateBranchStyle === 'function') updateBranchStyle(cab);

  if (cab === 'SEMUA') {
    document.getElementById('kasirHistoryTable').innerHTML = '<div class="empty-state"><p>Pilih cabang tertentu untuk mengelola kasir fisik.</p></div>';
    document.getElementById('btnAksiKasir').disabled = true;
    return;
  }
  document.getElementById('btnAksiKasir').disabled = false;

  Loading.show('Memuat data kas...');
  try {
    console.log('[KASIR DEBUG] Calling getKasirData with cab:', cab);
    const data = await API.call('getKasirData', cab);
    console.log('[KASIR DEBUG] Raw data received:', JSON.stringify(data));
    currentKasData = data || { totalFisik: 0, totalNonCash: 0, masukHariIni: 0, keluarHariIni: 0, nonCashMasukHariIni: 0, nonCashKeluarHariIni: 0, riwayatHariIni: [] };
    
    document.getElementById('kpiKasFisik').textContent = formatRupiah(currentKasData.totalFisik);
    document.getElementById('kpiNonCash').textContent = formatRupiah(currentKasData.totalNonCash || 0);
    document.getElementById('kpiKasMasukHariIni').textContent = formatRupiah(currentKasData.masukHariIni);
    document.getElementById('kpiKasKeluarHariIni').textContent = formatRupiah(currentKasData.keluarHariIni);
    document.getElementById('kpiNonCashMasuk').textContent = formatRupiah(currentKasData.nonCashMasukHariIni || 0);

    const el = document.getElementById('kasirHistoryTable');
    if (!currentKasData.riwayatHariIni || currentKasData.riwayatHariIni.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>Belum ada transaksi kas hari ini</p></div>';
    } else {
      let html = '<table class="data-table"><thead><tr><th>Waktu</th><th>Metode</th><th>Kategori</th><th>Sumber</th><th>Keterangan</th><th class="text-right">Masuk</th><th class="text-right">Keluar</th></tr></thead><tbody>';
      currentKasData.riwayatHariIni.forEach(k => {
        let timeStr = '-';
        try {
          const d = new Date(k.TANGGAL);
          if (!isNaN(d.getTime())) timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        } catch(e){}
        const isMasuk = k.JENIS === 'MASUK';
        const metodeBadge = k.METODE_BAYAR === 'CASH' 
          ? '<span class="badge badge-aktif">💵 CASH</span>' 
          : '<span class="badge" style="background:rgba(99,102,241,0.15);color:#818cf8">💳 TRANSFER</span>';
        html += `<tr><td>${timeStr}</td><td>${metodeBadge}</td><td><span class="badge badge-outline">${k.KATEGORI||'-'}</span></td><td style="font-size:11px">${k.SUMBER||'-'}</td><td>${k.KETERANGAN||'-'}</td>
        <td class="text-right" style="color:var(--accent-emerald);font-weight:600">${isMasuk ? formatRupiah(k.JUMLAH) : '-'}</td>
        <td class="text-right" style="color:var(--accent-red);font-weight:600">${!isMasuk ? formatRupiah(k.JUMLAH) : '-'}</td></tr>`;
      });
      el.innerHTML = html + '</tbody></table>';
    }
  } catch(e) { console.error('[KASIR DEBUG] Error:', e); Toast.error('Error: ' + e.message); }
  Loading.hide();
}

function toggleKasirAksi() {
  const aksi = document.getElementById('kasirAksi').value;
  if (aksi === 'BUKA') {
    document.getElementById('labelJumlahAksi').textContent = 'Jumlah Modal (Rp)';
    document.getElementById('btnAksiKasir').textContent = 'Proses Modal Awal';
    document.getElementById('sisaLaciGroup').style.display = 'none';
  } else if (aksi === 'TUTUP') {
    document.getElementById('labelJumlahAksi').textContent = 'Jumlah Disetor Tunai (Rp)';
    document.getElementById('btnAksiKasir').textContent = 'Proses Setor Tunai';
    document.getElementById('sisaLaciGroup').style.display = 'block';
  } else {
    document.getElementById('labelJumlahAksi').textContent = 'Jumlah Disetor Non-Tunai (Rp)';
    document.getElementById('btnAksiKasir').textContent = 'Proses Setor Non-Tunai';
    document.getElementById('sisaLaciGroup').style.display = 'block';
  }
  hitungSisaLaci();
}

function hitungSisaLaci() {
  const aksi = document.getElementById('kasirAksi').value;
  if (aksi === 'TUTUP' || aksi === 'TUTUP_NONCASH') {
    const total = aksi === 'TUTUP' ? (currentKasData.totalFisik || 0) : (currentKasData.totalNonCash || 0);
    const sisa = total - (Number(document.getElementById('aksiJumlah').value) || 0);
    const el = document.getElementById('aksiSisaBesok');
    if (el) {
      el.value = formatRupiah(sisa);
      el.style.color = sisa < 0 ? 'var(--accent-red)' : 'var(--text-primary)';
      el.previousElementSibling.textContent = aksi === 'TUTUP' ? 'Estimasi Sisa Laci Besok' : 'Estimasi Sisa Transfer Besok';
    }
  }
}

async function submitPengeluaran() {
  const cab = Session.getActiveViewCabang();
  if (cab === 'SEMUA') return Toast.warning('Pilih cabang spesifik');
  
  const jumlah = Number(document.getElementById('pengeluaranJumlah').value);
  const ket = document.getElementById('pengeluaranKet').value.trim();
  
  if (!jumlah || jumlah <= 0) return Toast.warning('Masukkan jumlah pengeluaran yang valid');
  if (!ket) return Toast.warning('Keterangan wajib diisi');

  const confirm = await Modal.confirm('Catat Pengeluaran', `Anda akan mencatat pengeluaran sebesar ${formatRupiah(jumlah)} untuk: ${ket}. Lanjutkan?`);
  if (!confirm) return;

  Loading.show('Mencatat...');
  try {
    const res = await API.call('saveKasirAksi', {
      cabang: cab,
      aksi: 'PENGELUARAN',
      jumlah: jumlah,
      keterangan: ket,
      metodeBayar: document.getElementById('pengeluaranMetode').value,
      createdBy: Session.getUsername()
    });
    if (res.success) {
      Toast.success(res.message);
      document.getElementById('pengeluaranJumlah').value = '';
      document.getElementById('pengeluaranKet').value = '';
      await refreshKasir();
    } else { Toast.error(res.message); }
  } catch(e) { Toast.error('Error: ' + e.message); }
  Loading.hide();
}

async function submitAksiKasir() {
  const cab = Session.getActiveViewCabang();
  if (cab === 'SEMUA') return Toast.warning('Pilih cabang spesifik');

  const aksi = document.getElementById('kasirAksi').value;
  const jumlah = Number(document.getElementById('aksiJumlah').value);

  if (!jumlah || jumlah <= 0) return Toast.warning('Masukkan jumlah yang valid');
  
  if (aksi === 'TUTUP' && jumlah > (currentKasData.totalFisik || 0)) {
    return Toast.warning('Jumlah setoran melebihi uang fisik di laci!');
  }
  if (aksi === 'TUTUP_NONCASH' && jumlah > (currentKasData.totalNonCash || 0)) {
    return Toast.warning('Jumlah setoran melebihi saldo Non-Tunai saat ini!');
  }

  let msg = '';
  if (aksi === 'BUKA') {
    msg = `Mencatat Modal Awal Laci sebesar ${formatRupiah(jumlah)}?`;
  } else if (aksi === 'TUTUP') {
    msg = `Setor Tunai: Menyetor ${formatRupiah(jumlah)} ke Owner? Sisa uang di laci akan menjadi ${formatRupiah((currentKasData.totalFisik||0) - jumlah)}.`;
  } else {
    msg = `Setor Non-Tunai: Menyetor transfer ${formatRupiah(jumlah)} ke Owner? Sisa saldo Non-Tunai akan menjadi ${formatRupiah((currentKasData.totalNonCash||0) - jumlah)}.`;
  }

  const confirm = await Modal.confirm('Konfirmasi Aksi Kasir', msg);
  if (!confirm) return;

  Loading.show('Memproses...');
  try {
    const res = await API.call('saveKasirAksi', {
      cabang: cab,
      aksi: aksi,
      jumlah: jumlah,
      keterangan: aksi === 'BUKA' ? 'Modal Awal Kasir' : 'Setoran Tutup Toko ke Owner',
      createdBy: Session.getUsername()
    });
    if (res.success) {
      Toast.success(res.message);
      document.getElementById('aksiJumlah').value = '';
      await refreshKasir();
    } else { Toast.error(res.message); }
  } catch(e) { Toast.error('Error: ' + e.message); }
  Loading.hide();
}
</script>
