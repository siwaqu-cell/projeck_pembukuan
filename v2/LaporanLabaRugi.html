<!-- LaporanLabaRugi.html — Detailed Profit & Loss Report -->
<script>
async function loadLaporanLabaRugi() {
  const cab = Session.getCabang();
  const content = document.getElementById('pageContent');
  content.innerHTML = `
    <div class="page-header">
      <div><h1 class="page-title">📈 Laporan Laba Rugi Detail</h1><p class="page-subtitle">Rincian pendapatan dan HPP harian per cabang</p></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" onclick="refreshLaporanLabaRugi()">🔄 Refresh</button>
        <button class="btn btn-outline" onclick="printLaporanLabaRugi()">🖨️ Cetak</button>
        <button class="btn btn-outline" onclick="navigateTo('dashboard')">← Dashboard</button>
      </div>
    </div>
    <div class="filter-bar">
      ${!Session.isCabangLocked()?`<div class="form-group"><label class="form-label">Cabang</label>
        <select class="form-control" id="lrCab" onchange="refreshLaporanLabaRugi()"><option value="SEMUA">Semua</option></select></div>`:''}
      <div class="form-group"><label class="form-label">Dari Tanggal</label>
        <input type="date" class="form-control" id="lrStart" value="${getMonthStartStr()}" onchange="refreshLaporanLabaRugi()"></div>
      <div class="form-group"><label class="form-label">Sampai Tanggal</label>
        <input type="date" class="form-control" id="lrEnd" value="${getTodayStr()}" onchange="refreshLaporanLabaRugi()"></div>
      <div class="form-group" style="align-self:flex-end">
        <button class="btn btn-outline" onclick="exportToCSV('lrTable', 'Laporan_Laba_Rugi')">📥 Export CSV</button>
      </div>
    </div>
    <div id="lrContent"><div class="empty-state"><div class="spinner" style="width:40px;height:40px;border-width:3px"></div><p style="margin-top:16px">Memuat laporan laba rugi...</p></div></div>`;

  if(!Session.isCabangLocked()){
    try{
      const cl=await API.call('getCabangList');
      const sel=document.getElementById('lrCab');
      cl.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.id+' - '+c.nama;sel.appendChild(o);});
      if(sel) sel.value = Session.getActiveViewCabang();
    }catch(e){}
  }
  refreshLaporanLabaRugi();
}

async function refreshLaporanLabaRugi() {
  const cabSel = document.getElementById('lrCab');
  if (cabSel && !Session.isCabangLocked()) {
    Session.setActiveViewCabang(cabSel.value);
  }
  const cab = Session.getActiveViewCabang();
  const periode = {startDate:document.getElementById('lrStart')?.value, endDate:document.getElementById('lrEnd')?.value};
  const el = document.getElementById('lrContent');
  
  if (Session.getRole() !== 'OWNER' && Session.getRole() !== 'ADMIN') {
    el.innerHTML = '<div class="empty-state">🔒 Anda tidak memiliki akses ke halaman ini.</div>';
    return;
  }

  try {
    const data = await API.call('getLaporanLabaRugiDetail', cab==='SEMUA'?'':cab, periode);
    if(!data || !data.daily || data.daily.length === 0) { el.innerHTML='<div class="empty-state"><p>Tidak ada data transaksi pada periode ini.</p></div>'; return; }
    
    const t = data.totals;

    el.innerHTML = `
      <div style="text-align:center;margin-bottom:24px;padding:16px;background:var(--bg-glass);border-radius:12px">
        <h2 style="font-size:20px;font-weight:700">Laporan Laba Rugi: ${cab==='SEMUA'?'Semua Cabang':cab}</h2>
        <p style="color:var(--text-muted);font-size:13px">Periode: ${data.periode?.start||''} s/d ${data.periode?.end||''}</p>
      </div>

      <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr)">
        <div class="kpi-card"><div class="kpi-label">Total Pendapatan</div><div class="kpi-value" style="background:var(--gradient-success);-webkit-background-clip:text">${formatRupiah(t.pendapatanTotal)}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:8px">Servis: ${formatRupiah(t.pendapatanServis)} | Jual: ${formatRupiah(t.pendapatanAksesoris)}</div></div>
        <div class="kpi-card"><div class="kpi-label">HPP / Modal Barang</div><div class="kpi-value" style="color:var(--accent-red)">${formatRupiah(t.totalModal)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Komisi Teknisi</div><div class="kpi-value" style="color:var(--accent-amber)">${formatRupiah(t.komisi)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Pengeluaran Toko</div><div class="kpi-value" style="color:var(--accent-amber)">${formatRupiah(t.pengeluaran)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Laba Bersih</div><div class="kpi-value" style="color:var(--accent-emerald)">${formatRupiah(t.labaBersih)}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:8px">Laba Kotor: ${formatRupiah(t.labaKotor)}</div></div>
      </div>

      <div class="card" style="margin-top:20px">
        <h3 class="card-title" style="margin-bottom:12px">📅 Rincian Harian</h3>
        <div class="table-container">
          <table class="data-table" id="lrTable">
            <thead>
              <tr>
                <th>Tanggal</th>
                <th class="text-center">Jml Trx</th>
                <th class="text-right">Pendptn Servis</th>
                <th class="text-right">Pendptn Jual</th>
                <th class="text-right">Total Pendptn</th>
                <th class="text-right">Modal Part</th>
                <th class="text-right">Laba Kotor</th>
                <th class="text-right">Komisi Tek</th>
                <th class="text-right">Pengeluaran</th>
                <th class="text-right" style="font-weight:700">Laba Bersih</th>
              </tr>
            </thead>
            <tbody>
              ${data.daily.map(d=>`
                <tr>
                  <td style="font-weight:600">${d.tanggal}</td>
                  <td class="text-center">${d.trxCount}</td>
                  <td class="text-right">${formatRupiah(d.pendapatanServis)}</td>
                  <td class="text-right">${formatRupiah(d.pendapatanAksesoris)}</td>
                  <td class="text-right" style="color:var(--accent-emerald)">${formatRupiah(d.pendapatanTotal)}</td>
                  <td class="text-right" style="color:var(--accent-red)">${formatRupiah(d.totalModal)}</td>
                  <td class="text-right">${formatRupiah(d.labaKotor)}</td>
                  <td class="text-right" style="color:var(--accent-amber)">${formatRupiah(d.komisi)}</td>
                  <td class="text-right" style="color:var(--accent-amber)">${formatRupiah(d.pengeluaran)}</td>
                  <td class="text-right" style="font-weight:700;color:var(--accent-emerald)">${formatRupiah(d.labaBersih)}</td>
                </tr>
              `).join('')}
            </tbody>
            <tfoot>
              <tr style="background:rgba(255,255,255,0.05);font-weight:700">
                <td colspan="2">TOTAL KESELURUHAN</td>
                <td class="text-right">${formatRupiah(t.pendapatanServis)}</td>
                <td class="text-right">${formatRupiah(t.pendapatanAksesoris)}</td>
                <td class="text-right">${formatRupiah(t.pendapatanTotal)}</td>
                <td class="text-right">${formatRupiah(t.totalModal)}</td>
                <td class="text-right">${formatRupiah(t.labaKotor)}</td>
                <td class="text-right">${formatRupiah(t.komisi)}</td>
                <td class="text-right">${formatRupiah(t.pengeluaran)}</td>
                <td class="text-right" style="color:var(--accent-emerald)">${formatRupiah(t.labaBersih)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    `;
  } catch(e) { el.innerHTML = '<div class="empty-state"><p>Error: '+e.message+'</p></div>'; }
}

function printLaporanLabaRugi() {
  if (typeof clearPrintArea === 'function') clearPrintArea();
  else { var el = document.getElementById('printAreaContainer'); if (el) el.innerHTML = ''; }
  setTimeout(function() { window.print(); }, 150);
}
</script>
